<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CRM Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="logo-area">
                <div class="logo-3d">🤖</div>
                <h2>AI <span>CRM</span></h2>
                <button class="theme-mini-btn" onclick="toggleMode()"><i class="fas fa-adjust"></i></button>
            </div>
            <div class="history-section">
                <p class="section-label">RECENT HISTORY</p>
                <div id="history-list">
                    <div class="history-item"><i class="far fa-comment"></i> Client Inquiry #1</div>
                </div>
            </div>
        </div>
        <div class="sidebar-bottom">
            <button class="util-btn" onclick="loadLeads()"><i class="fas fa-chart-pie"></i> Leads</button>
            <button class="util-btn" onclick="showClearConfirm()"><i class="fas fa-eraser"></i> Clear Chat</button>
        </div>
    </div>

    <div class="main">
        <div id="chat-box"></div>
        <div class="input-container">
            <div class="input-area">
                <input id="message" placeholder="Type or use voice..." autofocus autocomplete="off">
                <div class="action-buttons">
                    <button id="voice-btn" class="icon-btn" onclick="startVoice()"><i class="fas fa-microphone"></i></button>
                    <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-card">
        <i class="fas fa-trash-alt" style="font-size: 35px; color: #ff4757; margin-bottom: 15px; display:block;"></i>
        <h3>Reset Chat?</h3>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="hideClearConfirm()">Cancel</button>
            <button class="btn-confirm" onclick="clearChat()">Clear Now</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
